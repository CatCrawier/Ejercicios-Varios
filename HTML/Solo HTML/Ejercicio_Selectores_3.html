<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="author" content="Adrian Vasquez Perez" />
    <title>Ejercicio de selectores</title>
    <style>
        ul {
            list-style: none;
            padding: 0;
            width: 120px;
        }

        a {
            display: block;
            padding: 4px 8px;
            background-color: navy;
        }

        /* Estado normal: rojo sin subrayado */
        a:link {
            color: red;
            text-decoration: none;
        }

        /* Enlace visitado: verde oscuro sin subrayado */
        a:visited {
            color: darkgreen;
            text-decoration: none;
        }

        /* Enlace con foco de teclado: azul con subrayado */
        a:focus {
            color: blue;
            text-decoration: underline;
        }

        /* Cursor encima: texto blanco sobre fondo rojo, con subrayado */
        a:hover {
            color: white;
            background-color: red;
            text-decoration: underline;
        }

        /* Enlace activo: naranja sin subrayado */
        a:active {
            color: orange;
            text-decoration: none;
        }
    </style>
</head>
